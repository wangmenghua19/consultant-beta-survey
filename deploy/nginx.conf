# 示例：内网 Nginx 托管 dist（SPA 路由）
# 将 dist 内容放到 /var/www/beta-survey/
# include 或复制到 /etc/nginx/conf.d/beta-survey.conf

server {
    listen 80;
    server_name survey.intra.example.com;  # 改成你的内网域名或 _

    root /var/www/beta-survey;
    index index.html;

    # 静态资源长缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA：非文件路径均回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
