# 根域名托管问卷 SPA
# 1. 将 dist 内容放到 /var/www/beta-survey/
# 2. 把 server_name 改成你的域名
# 3. sudo cp 到 /etc/nginx/conf.d/ 后 nginx -t && reload

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    root /var/www/beta-survey;
    index index.html;

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}

# HTTPS：建议用 certbot --nginx 自动配置 443
